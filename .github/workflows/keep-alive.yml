name: Supabase Keep-Alive

on:
  schedule:
    # Every 5 minutes — prevents Supabase free tier cold starts
    - cron: '*/5 * * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/jm_users?limit=1" \
            -o /dev/null && echo "✅ Supabase is warm" || echo "⚠️ Ping failed (non-critical)"
